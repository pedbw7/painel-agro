<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Agro</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#0c1f14,#123524);
    color:white;
    text-align:center;
}

h1{
    padding:20px;
    font-size:28px;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    padding-bottom:40px;
}

.card{
    width:85%;
    max-width:420px;
    background:#1c4d32;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.titulo{
    font-size:18px;
    opacity:0.8;
}

.valor{
    font-size:38px;
    font-weight:bold;
    margin-top:10px;
}

.atualizacao{
    margin-top:20px;
    font-size:14px;
    opacity:0.6;
}
</style>
</head>

<body>

<h1>🌾 Painel Agro</h1>

<div class="container">

<div class="card">
<div class="titulo">Dólar</div>
<div id="dolar" class="valor">Carregando...</div>
</div>

<div class="card">
<div class="titulo">Euro</div>
<div id="euro" class="valor">Carregando...</div>
</div>

<div class="card">
<div class="titulo">Soja (referência internacional)</div>
<div id="soja" class="valor">Indisponível</div>
</div>

<div class="card">
<div class="titulo">Milho (referência internacional)</div>
<div id="milho" class="valor">Indisponível</div>
</div>

<div class="atualizacao" id="hora"></div>

</div>

<script>
async function atualizar(){
    try{
        const resposta = await fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL,EUR-BRL");
        const dados = await resposta.json();

        document.getElementById("dolar").innerText =
        "R$ " + parseFloat(dados.USDBRL.bid).toFixed(2);

        document.getElementById("euro").innerText =
        "R$ " + parseFloat(dados.EURBRL.bid).toFixed(2);

        const agora = new Date();
        document.getElementById("hora").innerText =
        "Última atualização: " + agora.toLocaleTimeString();

    }catch(e){
        console.log("Erro ao buscar dados");
    }
}

atualizar();
setInterval(atualizar,60000);
</script>

</body>
</html>
